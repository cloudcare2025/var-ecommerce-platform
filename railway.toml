# Railway Deployment Configuration
# This project deploys as a monorepo with multiple services.
# Each service is configured separately in the Railway dashboard
# using the "Root Directory" setting to point to the correct app.
#
# Services:
#   1. admin     — Root Directory: apps/admin
#   2. storefront-sonicwall — Root Directory: apps/storefront (BRAND_SLUG=sonicwall)
#   3. postgres  — Railway-managed PostgreSQL
#
# To add a new brand storefront:
#   1. Create a new Railway service in the project
#   2. Set Root Directory to: apps/storefront
#   3. Set BRAND_SLUG env var to the brand's slug
#   4. Set DATABASE_URL to the shared Postgres connection string
#   5. Add a custom domain for the brand

[build]
builder = "nixpacks"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
