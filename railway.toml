# Railway Deployment Configuration
# ================================
# Repo: cloudcare2025/var-ecommerce-platform (single repo, multi-branch)
#
# Architecture:
#   main branch (monorepo)
#     ├─ admin-portal      → Dockerfile: apps/admin/Dockerfile
#     └─ sync-worker       → Dockerfile: packages/sync/Dockerfile
#
#   storefront-sonicwall branch (standalone Next.js)
#     └─ storefront-sonicwall → Dockerfile at branch root
#
#   storefront-samsung branch (standalone Next.js)
#     └─ storefront-samsung   → Dockerfile at branch root
#
# Each service sets RAILWAY_DOCKERFILE_PATH to select its Dockerfile.
# Storefronts live on dedicated branches with standalone builds.
# PostgreSQL is a Railway-managed service (shared by all).

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
